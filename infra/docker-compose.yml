version: '3.9'
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pariconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:RELEASE.2024-03-07T00-30-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  api:
    build:
      context: ..
      dockerfile: infra/node.Dockerfile
      args:
        WORKSPACE: packages/api
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pariconnect
      PAYMENTS_PROVIDER: stripe
      MINIO_BUCKET: pariconnect-media
      JWT_SECRET: super-secret-change-me
    depends_on:
      - postgres
    ports:
      - '4000:4000'

  web:
    build:
      context: ..
      dockerfile: infra/node.Dockerfile
      args:
        WORKSPACE: apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api
    ports:
      - '3000:3000'

  admin:
    build:
      context: ..
      dockerfile: infra/node.Dockerfile
      args:
        WORKSPACE: apps/admin
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api
    ports:
      - '3100:3000'

  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - web
      - admin
      - api
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '8080:80'

volumes:
  postgres_data:
  minio_data:
